  <script>
function toggleBooking() {

  const booking = document.getElementById("booking");

  // Toggle booking section
  booking.classList.toggle("hidden");

  // Smooth scroll only when opened
  if (!booking.classList.contains("hidden")) {

    booking.scrollIntoView({
      behavior: "smooth",
      block: "start"
    });

  }

}

const scriptURL = "https://script.google.com/macros/s/AKfycbxH7Xi_hXEVi0_G3ot4cka9FvffGpIPcUetpqavsvHhxpCjkGiLWfo11sMc2GcRyOVdSA/exec";

document
.getElementById("bookingForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    guests: document.getElementById("guests").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value
  };

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })

  .then(() => {

    alert("Table Booked Successfully!");

    // Reset form
    document.getElementById("bookingForm").reset();

    // Close booking section automatically
    document
      .getElementById("booking")
      .classList.add("hidden");

  })

  .catch((error) => {

    console.log(error);

    alert("Booking Failed!");

  });

});





</script>
