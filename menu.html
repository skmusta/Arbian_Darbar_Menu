<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabian Darbar Menu</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#000;
      color:#fff;
    }

    .header{
      text-align:center;
      padding:25px 15px;
      background:#111;
      border-bottom:1px solid #222;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .header h1{
      color:#f5b041;
      font-size:32px;
      font-weight:700;
    }

    .header p{
      color:#bbb;
      margin-top:5px;
      font-size:14px;
    }

    .menu-wrapper{
      width:100%;
      max-width:900px;
      margin:auto;
      padding:20px;
    }

.menu-image{
  display:flex;
  flex-direction:column;
  gap:25px;
}

.menu-image img{
  width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  border:2px solid #222;
  box-shadow:0 0 20px rgba(255,165,0,0.12);
  transition:0.3s ease;
  cursor:pointer;
}

.menu-image img:hover{
  transform:scale(1.01);
  box-shadow:0 0 25px rgba(255,165,0,0.25);
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
}

.popup.active{
  display:flex;
}

.popup img{
  max-width:100%;
  max-height:95vh;
  border-radius:15px;
}

.close-btn{
  position:absolute;
  top:20px;
  right:25px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}

    .footer{
      text-align:center;
      color:#777;
      font-size:13px;
      padding:20px;
    }

    @media(max-width:600px){

      .header h1{
        font-size:26px;
      }

      .menu-wrapper{
        padding:12px;
      }

    }


    .menu-image{
  display:flex;
  flex-direction:column;
  gap:25px; /* spacing between images */
}

.menu-image img{
  width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  border:2px solid #222;
  box-shadow:0 0 20px rgba(255,165,0,0.12);
  transition:0.3s ease;
}

.menu-image img:hover{
  transform:scale(1.01);
  box-shadow:0 0 25px rgba(255,165,0,0.25);
}
  </style>

</head>
<body>

  <!-- HEADER -->

  <div class="header">
    <h1>Arabian Darbar</h1>
    <p>Digital Menu Card</p>
  </div>

  <!-- MENU IMAGE -->

  <div class="menu-wrapper">

<!-- MENU IMAGES -->

<div class="menu-image">

  <img src="img/menu 1.png" onclick="openPopup(this.src)" alt="">
  <img src="img/menu 2.png" onclick="openPopup(this.src)" alt="">
  <img src="img/menu 3.png" onclick="openPopup(this.src)" alt="">
  <img src="img/menu4.png" onclick="openPopup(this.src)" alt="">
  <img src="img/menu 5.png" onclick="openPopup(this.src)" alt="">
  <img src="img/menu 6.png" onclick="openPopup(this.src)" alt="">

</div>

<!-- POPUP -->

<div class="popup" id="popup">
  <span class="close-btn" onclick="closePopup()">×</span>
  <img id="popup-img" src="">
</div>

  </div>

  <!-- FOOTER -->

  <div class="footer">
    © 2026 Arabian Darbar • All Rights Reserved
  </div>


  <script>

function openPopup(src){
  document.getElementById('popup').classList.add('active');
  document.getElementById('popup-img').src = src;
}

function closePopup(){
  document.getElementById('popup').classList.remove('active');
}

</script>

</body>
</html>
